<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognito Auth Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0052a3;
        }
        .user-info {
            margin-top: 20px;
            padding: 20px;
            background-color: #f0f0f0;
            border-radius: 4px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>AWS Cognito Authentication Test</h1>
    
    <div id="login-section">
        <button onclick="login()">Login with Cognito</button>
    </div>

    <div id="user-section" class="hidden">
        <h2>Logged In Successfully!</h2>
        <div class="user-info">
            <p><strong>Access Token:</strong></p>
            <p id="access-token" style="word-break: break-all; font-size: 12px;"></p>
            <p><strong>ID Token:</strong></p>
            <p id="id-token" style="word-break: break-all; font-size: 12px;"></p>
            <p><strong>User Info:</strong></p>
            <pre id="user-info"></pre>
        </div>
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        const config = {
            cognitoDomain: 'https://us-east-1pj2skif2p.auth.us-east-1.amazoncognito.com',
            clientId: '6cbd40u51cppum0mavmgia0ti6',
            redirectUri: 'http://localhost:3000',
            scope: 'openid email profile'
        };

        // Generate random string for PKCE
        function generateRandomString(length) {
            const charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
            let random = '';
            const randomValues = new Uint8Array(length);
            crypto.getRandomValues(randomValues);
            for (let i = 0; i < length; i++) {
                random += charset[randomValues[i] % charset.length];
            }
            return random;
        }

        // Generate code challenge from verifier
        async function generateCodeChallenge(codeVerifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(codeVerifier);
            const digest = await crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode(...new Uint8Array(digest)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=/g, '');
        }

        // Login function
        async function login() {
            // Generate and store code verifier
            const codeVerifier = generateRandomString(128);
            sessionStorage.setItem('code_verifier', codeVerifier);

            // Generate code challenge
            const codeChallenge = await generateCodeChallenge(codeVerifier);

            // Build authorization URL
            const authUrl = `${config.cognitoDomain}/oauth2/authorize?` +
                `client_id=${config.clientId}&` +
                `response_type=code&` +
                `scope=${encodeURIComponent(config.scope)}&` +
                `redirect_uri=${encodeURIComponent(config.redirectUri)}&` +
                `code_challenge=${codeChallenge}&` +
                `code_challenge_method=S256`;

            window.location.href = authUrl;
        }

        // Exchange authorization code for tokens
        async function exchangeCodeForTokens(code) {
            const codeVerifier = sessionStorage.getItem('code_verifier');
            
            const tokenUrl = `${config.cognitoDomain}/oauth2/token`;
            const body = new URLSearchParams({
                grant_type: 'authorization_code',
                client_id: config.clientId,
                code: code,
                redirect_uri: config.redirectUri,
                code_verifier: codeVerifier
            });

            try {
                const response = await fetch(tokenUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: body.toString()
                });

                if (!response.ok) {
                    throw new Error(`Token exchange failed: ${response.status}`);
                }

                const tokens = await response.json();
                
                // Store tokens
                sessionStorage.setItem('access_token', tokens.access_token);
                sessionStorage.setItem('id_token', tokens.id_token);
                
                // Clear code verifier
                sessionStorage.removeItem('code_verifier');
                
                return tokens;
            } catch (error) {
                console.error('Error exchanging code for tokens:', error);
                throw error;
            }
        }

        // Parse JWT token
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => 
                    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
                ).join(''));
                return JSON.parse(jsonPayload);
            } catch (error) {
                console.error('Error parsing JWT:', error);
                return null;
            }
        }

        // Display user info
        function displayUserInfo(tokens) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('user-section').classList.remove('hidden');
            
            document.getElementById('access-token').textContent = tokens.access_token;
            document.getElementById('id-token').textContent = tokens.id_token;
            
            const idTokenPayload = parseJwt(tokens.id_token);
            document.getElementById('user-info').textContent = JSON.stringify(idTokenPayload, null, 2);
        }

        // Logout function
        function logout() {
            sessionStorage.clear();
            
            const logoutUrl = `${config.cognitoDomain}/logout?` +
                `client_id=${config.clientId}&` +
                `logout_uri=${encodeURIComponent(config.redirectUri)}`;
            
            window.location.href = logoutUrl;
        }

        // Check for authorization code in URL on page load
        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                try {
                    // Exchange code for tokens
                    const tokens = await exchangeCodeForTokens(code);
                    
                    // Display user info
                    displayUserInfo(tokens);
                    
                    // Clean up URL
                    window.history.replaceState({}, document.title, '/');
                } catch (error) {
                    console.error('Authentication failed:', error);
                    alert('Authentication failed. Please try again.');
                }
            } else {
                // Check if already logged in
                const accessToken = sessionStorage.getItem('access_token');
                const idToken = sessionStorage.getItem('id_token');
                
                if (accessToken && idToken) {
                    displayUserInfo({ access_token: accessToken, id_token: idToken });
                }
            }
        });
    </script>
</body>
</html>
