name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
permissions:
    contents: write
    pages: write
    id-token: write
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Start HTTP Server
      run: |
        python -m http.server 3000 &
        sleep 2
      working-directory: ./

    - name: Run Playwright tests
      run: npx playwright test
      env:
        TEST_EMAIL1: ${{ secrets.TEST_EMAIL1 }}
        TEST_PASSWORD1: ${{ secrets.TEST_PASSWORD1 }}
        TEST_EMAIL2: ${{ secrets.TEST_EMAIL2 }}
        TEST_PASSWORD2: ${{ secrets.TEST_PASSWORD2 }}
        TEST_EMAIL3: ${{ secrets.TEST_EMAIL3 }}
        TEST_PASSWORD3: ${{ secrets.TEST_PASSWORD3 }}
        API_BASE_URL: ${{ secrets.API_BASE_URL }}
        BASE_URL: http://localhost:3000
    - name: Install Allure
      run: npm install -g allure-commandline

    - name: Generate Allure Report
      if: always()
      run: allure generate allure-results --clean -o allure-report

    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report
        retention-days: 30
    - name: Upload screenshots on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: '*.png'
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Deploy Allure Report to GitHub Pages
      if: always() && github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        keep_files: false